<span class="badge badge-completed">Completed</span>
<h3>Hello {{employeeName}},</h3>
<p>The Error Correction Report lifecycle is now complete.</p>

<table class="table-details">
  <tr>
    <td class="label">Report Number</td>
    <td class="value"><strong>{{reportId}}</strong></td>
  </tr>
  <tr>
    <td class="label">Status</td>
    <td class="value" style="font-weight: bold;">{{status}}</td>
  </tr>
  <tr>
    <td class="label">Closed By</td>
    <td class="value">{{reviewer}}</td>
  </tr>
</table>

<div style="text-align: center;">
  <a href="{{applicationUrl}}" class="btn">Open Report</a>
</div>
