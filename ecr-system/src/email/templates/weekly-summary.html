<span class="badge badge-returned">Weekly Summary</span>
<h3>Hello {{employeeName}},</h3>
<p>Here is your weekly summary of Error Correction Reports.</p>

<table class="table-details">
  <tr>
    <td class="label">Total Reports Active</td>
    <td class="value">{{comments}}</td>
  </tr>
  <tr>
    <td class="label">Reports Approved</td>
    <td class="value">{{reviewer}}</td>
  </tr>
  <tr>
    <td class="label">Awaiting Review</td>
    <td class="value">{{reportId}}</td>
  </tr>
</table>

<div style="text-align: center;">
  <a href="{{applicationUrl}}" class="btn">View Dashboard</a>
</div>
